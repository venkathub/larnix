# Content & code quality gates (extended task by task through P0).
#
# This task (P0 task 4) adds the front-matter schema gate. Later P0 tasks add
# jobs here: notebook execution (R10, task 8), prose/link/spell (task 9),
# a11y (task 10), and the R1/R3/R6 gates (task 11).

name: Checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontmatter:
    name: Front-matter schema lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CI deps
        run: pip install -r infra/ci/requirements.txt

      - name: Unit tests (frontmatter_lint)
        working-directory: infra/ci
        run: python -m unittest -v

      - name: Unit tests (grader)
        working-directory: lib
        run: python -m unittest -v

      - name: Lint chapter front-matter
        run: python infra/ci/frontmatter_lint.py
