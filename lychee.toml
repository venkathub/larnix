# lychee link-checker config.
# Verifies internal + external links in docs and content; skips generated and
# vendored files and the not-yet-published production URLs.

# Don't descend into generated output or the vendored quarto-live extension.
exclude_path = [
  "_site",
  "_extensions/r-wasm",
  "node_modules",
  ".git",
  ".quarto",
]

# Placeholder/future URLs that do not resolve yet, plus local hosts.
exclude = [
  "^https?://larnix\\.github\\.io",
  "^https?://github\\.com/larnix",
  "^https?://localhost",
  "^https?://127\\.0\\.0\\.1",
  "^https?://0\\.0\\.0\\.0",
  "example\\.com",
]

# Be resilient to rate limits and slow hosts.
max_retries = 2
retry_wait_time = 2
timeout = 20
accept = ["200", "206", "429"]
