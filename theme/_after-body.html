<script>
/* Larnix navbar fixes (loaded after body):
   1) Highlight the navbar link that matches the CURRENT page (Quarto sometimes
      marks a deep chapter link active on unrelated pages).
   2) Keep the theme-toggle tooltip in sync with the mode it switches TO. */
(function () {
  function norm(p) { return (p.replace(/index\.html$/, "").replace(/\/$/, "") || "/"); }

  function fixNavActive() {
    var here = norm(location.pathname);
    document.querySelectorAll(".navbar .navbar-nav .nav-link").forEach(function (a) {
      var href = a.getAttribute("href");
      if (!href || href.charAt(0) === "#") return;
      var path;
      try { path = norm(new URL(href, location.href).pathname); } catch (e) { return; }
      var on = path === here;
      a.classList.toggle("active", on);
      if (on) a.setAttribute("aria-current", "page"); else a.removeAttribute("aria-current");
    });
  }

  function fixToggleTitle() {
    var t = document.querySelector(".quarto-color-scheme-toggle");
    if (!t) return;
    var dark = document.body.classList.contains("quarto-dark");
    var label = dark ? "Switch to light mode" : "Switch to dark mode";
    t.setAttribute("title", label);
    t.setAttribute("aria-label", label);
  }

  function run() { fixNavActive(); fixToggleTitle(); }
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", run);
  else run();
  new MutationObserver(fixToggleTitle).observe(document.body, { attributes: true, attributeFilter: ["class"] });
})();
</script>

<script>
/* Larnix live-cell status: show "Setting up…" (not "Running…") while a cell is
   downloading/installing its Python packages.

   quarto-live drives a single per-cell indicator (.exercise-editor-eval-indicator)
   for the whole evaluate() call, so the Run button reads "Running…" even while
   Pyodide is still fetching packages on first use — a one-time download that can
   take many seconds and reads as a hang. We split the package-load phase out:
   pre-load the cell's imports (tagging the active editor .lx-loading-pkg so CSS
   swaps the label to "Setting up…"), THEN hand off to the original evaluate(),
   whose own load step is now a no-op, so "Running…" shows only for real
   execution. A short delay before tagging means already-cached packages (the
   common case after first run) never flash the setup state. */
(function () {
  var LOADING_CLASS = "lx-loading-pkg";
  var DELAY_MS = 150;       // don't flash "Setting up…" for instant cached loads
  var POLL_MS = 100, MAX_TRIES = 200; // wait up to ~20s for the runtime to load
  var firstRun = true;      // first eval of the page always involves a download

  function activeEditors() {
    return Array.prototype.filter.call(
      document.querySelectorAll(".exercise-editor"),
      function (ed) {
        var ind = ed.querySelector(".exercise-editor-eval-indicator");
        return ind && !ind.classList.contains("d-none");
      }
    );
  }

  function patch() {
    var rt = window._exercise_ojs_runtime;
    if (!rt || !rt.PyodideEvaluator) return false;
    var proto = rt.PyodideEvaluator.prototype;
    if (proto.__lxLoadingPatched) return true;
    proto.__lxLoadingPatched = true;

    var originalEvaluate = proto.evaluate;
    proto.evaluate = async function (code) {
      if (code != null && this.pyodide) {
        var editors = [];
        // First eval of the page hands straight off from the runtime bootstrap
        // (which already shows "Setting up…"), so tag immediately to avoid a
        // brief "Running…" flash in the gap; later evals keep the anti-flash delay.
        var delay = firstRun ? 0 : DELAY_MS;
        firstRun = false;
        var timer = setTimeout(function () {
          editors = activeEditors();
          editors.forEach(function (ed) { ed.classList.add(LOADING_CLASS); });
        }, delay);
        try {
          // Download/install any packages this cell imports, up front.
          await this.pyodide.loadPackagesFromImports(code);
        } catch (e) {
          /* swallow — let the original evaluate() surface the real error */
        } finally {
          clearTimeout(timer);
          editors.forEach(function (ed) { ed.classList.remove(LOADING_CLASS); });
        }
      }
      // Packages are cached now, so the original load step is a no-op and the
      // cell correctly shows "Running…" only while the code executes.
      return originalEvaluate.apply(this, arguments);
    };
    return true;
  }

  if (!patch()) {
    var tries = 0;
    var iv = setInterval(function () {
      if (patch() || ++tries >= MAX_TRIES) clearInterval(iv);
    }, POLL_MS);
  }
})();
</script>
