        text: Home
      - href: modules/00-orientation/ch01-train-your-first-model.qmd
        text: Start learning
      - href: about.qmd
        text: About
    right:
      - icon: github
        href: https://github.com/venkathub/larnix
        aria-label: Larnix on GitHub
  sidebar:
