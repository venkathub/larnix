          - text: "Ch3 — What is AI, really?"
            href: modules/00-orientation/ch03-what-is-ai-really.qmd
          - text: "Ch4 — AI vs ML vs DL vs GenAI"
            href: modules/00-orientation/ch04-ai-ml-dl-genai.qmd
          - text: "Ch5 — A 10-minute history of AI"
            href: modules/00-orientation/ch05-history-of-ai.qmd
          - text: "Ch6 — How this school works"
            href: modules/00-orientation/ch06-how-this-school-works.qmd
      - section: "M1 — Python for AI"
