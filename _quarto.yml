project:
  type: website
  output-dir: _site
  # Single Quarto project at the repo root (DECISIONS D0013). Render the landing
  # pages and the module chapters; the CI twins (.ipynb) and fixtures are not
  # learner pages and are excluded. Chapter sidebar nav lands in P0 task 15.
  render:
    - "*.qmd"
    - "modules/**/*.qmd"

# "Open in Colab" target — set at publish time (never hardcoded in the shortcode).
# Override per-environment with LARNIX_COLAB_REPO / LARNIX_COLAB_BRANCH.
larnix-colab-repo: "venkathub/larnix"
larnix-colab-branch: "main"

# Execution settings. `freeze: auto` caches computed cell output so a fresh
# `quarto render` does not need to re-execute unchanged pages. CI (P0 task 8)
# executes notebooks explicitly; the R10 gate owns "everything runs".
execute:
  freeze: auto

website:
  title: "Larnix"
  description: "A free, beginner-to-frontier school for AI/ML — every chapter runs."
  site-url: "https://venkathub.github.io/larnix"
  favicon: favicon.svg
  search:
    location: navbar
    type: overlay
  navbar:
    title: "Larnix"
    pinned: true
    left:
